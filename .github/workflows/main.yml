name: Build FahrReady APK
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Install dependencies
        run: npm install
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Create bundle directory
        run: mkdir -p android/app/src/main/assets
      - name: Bundle JavaScript
        run: |
          npx react-native bundle \
            --platform android \
            --dev false \
            --entry-file index.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res
      - name: Setup signing keystore
        run: |
          mkdir -p android/app
          echo "" | base64 -d > android/app/fahrready-release.keystore

      - name: Configure release signing
        run: |
          cat > /tmp/patch_gradle.py << 'PATCHEOF'
          import re
          
          with open('android/app/build.gradle') as f:
              g = f.read()
          
          def find_block(text, start_idx):
              # start_idx points to '{', return index after matching '}'
              depth = 0
              for i in range(start_idx, len(text)):
                  if text[i] == '{':
                      depth += 1
                  elif text[i] == '}':
                      depth -= 1
                      if depth == 0:
                          return i
              return -1
          
          # Remove existing signingConfigs block if present
          m = re.search(r'signingConfigs\s*\{', g)
          if m:
              end = find_block(g, g.index('{', m.start()))
              g = g[:m.start()] + g[end+1:]
          
          # Build new signingConfigs block
          new_sc = """signingConfigs {
                  debug {
                      storeFile file('debug.keystore')
                      storePassword 'android'
                      keyAlias 'androiddebugkey'
                      keyPassword 'android'
                  }
                  release {
                      storeFile file('fahrready-release.keystore')
                      storePassword 'FahrReady2026'
                      keyAlias 'fahrready'
                      keyPassword 'FahrReady2026'
                  }
              }
              """
          
          # Insert before buildTypes
          m2 = re.search(r'buildTypes\s*\{', g)
          g = g[:m2.start()] + new_sc + g[m2.start():]
          
          # Now fix signingConfig references inside buildTypes
          m3 = re.search(r'buildTypes\s*\{', g)
          bt_start = g.index('{', m3.start())
          bt_end = find_block(g, bt_start)
          bt_content = g[bt_start:bt_end+1]
          
          bt_content = re.sub(r'(debug\s*\{[^{}]*?)signingConfig\s+signingConfigs\.\w+', r'\1signingConfig signingConfigs.debug', bt_content, flags=re.DOTALL)
          bt_content = re.sub(r'(release\s*\{[^{}]*?)signingConfig\s+signingConfigs\.\w+', r'\1signingConfig signingConfigs.release', bt_content, flags=re.DOTALL)
          
          g = g[:bt_start] + bt_content + g[bt_end+1:]
          
          with open('android/app/build.gradle','w') as f:
              f.write(g)
          print("build.gradle patched (v3)")
          PATCHEOF
          python3 /tmp/patch_gradle.py
          grep -A 18 'signingConfigs {' android/app/build.gradle

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon
      - name: Build AAB
        run: |
          cd android
          ./gradlew bundleRelease --no-daemon
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FahrReady-release-apk
          path: android/app/build/outputs/apk/release/*.apk
      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: FahrReady-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
