name: Build FahrReady APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: npm install

      - name: Create bundle directory
        run: mkdir -p android/app/src/main/assets

      - name: Bundle JavaScript
        run: |
          npx react-native bundle \
            --platform android \
            --dev false \
            --entry-file index.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res

      - name: Set app icons
        run: |
          node -e "
          const fs = require('fs');
          const b64 = '';
          const buf = Buffer.from(b64, 'base64');
          const dirs = [
            'android/app/src/main/res/mipmap-mdpi',
            'android/app/src/main/res/mipmap-hdpi', 
            'android/app/src/main/res/mipmap-xhdpi',
            'android/app/src/main/res/mipmap-xxhdpi',
            'android/app/src/main/res/mipmap-xxxhdpi'
          ];
          dirs.forEach(dir => {
            fs.mkdirSync(dir, {recursive: true});
            fs.writeFileSync(dir + '/ic_launcher.png', buf);
            fs.writeFileSync(dir + '/ic_launcher_round.png', buf);
            // Remove XML adaptive icon files that override PNG
            const xmlFiles = [dir + '/ic_launcher.xml', dir + '/ic_launcher_round.xml'];
            xmlFiles.forEach(f => { try { fs.unlinkSync(f); } catch(e) {} });
          });
          // Also remove mipmap-anydpi-v26 which has adaptive icons
          try {
            const anydpi = 'android/app/src/main/res/mipmap-anydpi-v26';
            fs.readdirSync(anydpi).forEach(f => fs.unlinkSync(anydpi + '/' + f));
          } catch(e) {}
          console.log('Icons set!');
          "

      - name: Setup signing keystore
        run: |
          mkdir -p android/app
          echo "" | base64 -d > android/app/fahrready-release.keystore

      - name: Configure release signing
        run: |
          cat > /tmp/patch_gradle.py << 'PATCHEOF'
          import re
          with open('android/app/build.gradle') as f:
              g = f.read()
          
          # Remove any existing (possibly broken) signingConfigs block entirely
          g = re.sub(r'\n\s*signingConfigs\s*\{[^}]*(\{[^}]*\}[^}]*)*\}', '', g, flags=re.DOTALL)
          
          release_sc = """
              signingConfigs {
                  debug {
                      storeFile file('debug.keystore')
                      storePassword 'android'
                      keyAlias 'androiddebugkey'
                      keyPassword 'android'
                  }
                  release {
                      storeFile file('fahrready-release.keystore')
                      storePassword 'FahrReady2026'
                      keyAlias 'fahrready'
                      keyPassword 'FahrReady2026'
                  }
              }
          """
          
          # Insert before buildTypes
          g = re.sub(r'(\n\s*buildTypes\s*\{)', release_sc + r'\1', g, count=1)
          
          # Point release buildType signingConfig to release
          g = re.sub(r'signingConfig\s+signingConfigs\.\w+', 'signingConfig signingConfigs.release', g)
          
          # But debug buildType (if any) should keep debug signing - fix: only change inside release {...}
          # Re-extract buildTypes block and fix per-buildtype
          def fix_buildtypes(m):
              bt = m.group(0)
              # within debug{...}, set debug signing
              bt = re.sub(r'(debug\s*\{[^}]*?)signingConfig\s+signingConfigs\.\w+', r'\1signingConfig signingConfigs.debug', bt, flags=re.DOTALL)
              bt = re.sub(r'(release\s*\{[^}]*?)signingConfig\s+signingConfigs\.\w+', r'\1signingConfig signingConfigs.release', bt, flags=re.DOTALL)
              return bt
          
          g = re.sub(r'buildTypes\s*\{.*?\n    \}', fix_buildtypes, g, flags=re.DOTALL, count=1)
          
          with open('android/app/build.gradle','w') as f:
              f.write(g)
          print("build.gradle patched (v2)")
          PATCHEOF
          python3 /tmp/patch_gradle.py
          grep -A 20 'signingConfigs {' android/app/build.gradle

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Build AAB
        run: |
          cd android
          ./gradlew bundleRelease --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FahrReady-release-apk
          path: android/app/build/outputs/apk/release/*.apk

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: FahrReady-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
