name: Build FahrReady APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: npm install

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create bundle directory
        run: mkdir -p android/app/src/main/assets

      - name: Bundle JavaScript
        run: |
          npx react-native bundle \
            --platform android \
            --dev false \
            --entry-file index.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res

      - name: Set app icons
        run: |
          node -e "
          const fs = require('fs');
          const b64 = '';
          const buf = Buffer.from(b64, 'base64');
          const dirs = [
            'android/app/src/main/res/mipmap-mdpi',
            'android/app/src/main/res/mipmap-hdpi', 
            'android/app/src/main/res/mipmap-xhdpi',
            'android/app/src/main/res/mipmap-xxhdpi',
            'android/app/src/main/res/mipmap-xxxhdpi'
          ];
          dirs.forEach(dir => {
            fs.mkdirSync(dir, {recursive: true});
            fs.writeFileSync(dir + '/ic_launcher.png', buf);
            fs.writeFileSync(dir + '/ic_launcher_round.png', buf);
            fs.writeFileSync(dir + '/ic_launcher_foreground.png', buf);
          });
          console.log('Icons set!');
          "

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Build AAB
        run: |
          cd android
          ./gradlew bundleRelease --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FahrReady-release-apk
          path: android/app/build/outputs/apk/release/*.apk

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: FahrReady-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
